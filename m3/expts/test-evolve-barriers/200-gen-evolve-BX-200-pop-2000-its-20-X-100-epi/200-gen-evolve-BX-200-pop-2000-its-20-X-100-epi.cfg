#
### ENVIRONMENT SPEC
#
env-width=650
env-height=800
tunnel-width=450
tunnel-height=600
tunnel-x=100
tunnel-y=100
## *** FIXED TUNNEL ENTRANCE SPEC FOR RUNS WHERE WE ARE NOT EVOLVING ENTRANCE POSITION ***
tunnel-entrance=175,275:2:0
#net-antibird-exit-prob=0.1187
#net-antibird-max-exit-attempts=7
#net-antihail-exit-prob=0.0371
#net-antihail-max-exit-attempts=11
#barrier=150,300:200,300:4,100:3,100
barrier-pass-prob=0.1
#
### FLOWER SPEC
#
patch=150,150,50,500:10:0.1:1:4:100,0
flower-initial-nectar=100
plant-default-spacing=10.0
plant-default-jitter=0.1
#
### BEE AND HIVE SPEC
#
## *** FIXED HIVE SPEC FOR RUNS WHERE WE ARE NOT EVOLVING HIVE POSITION ***
hive=325,750:0
num-bees=50
bee-max-dir-delta=0.5
bee-step-length=15
bee-path-record-len=0
bee-visual-range=11
bee-visit-memory-length=5
bee-prob-visit-nearest-flower=0.8
bee-in-hive-duration=200
bee-initial-energy=500
bee-energy-depletion-per-step=1
bee-energy-boost-per-flower=10
bee-on-flower-duration=3
bee-energy-min-threshold=0
bee-energy-max-threshold=750
#
### SIM SPEC
#
num-iterations=2000
target-heatmap-filename=target-heatmaps/target-heatmap-13x16-4-rows.csv
heatmap-cell-size=50
#
### EVOLUTION SPEC
#
evolve=true
# evolve-objective: 0=EMD to target heatmap, 1=Fraction of flowers in successful visit range
evolve-objective=1
min-visit-count-success=3
max-visit-count-success=1000
# evolve-spec format: [E:n,w][;][H:i,o,f][;][B:n,w][;][X:n,w] where
# /E/ n=num entrances, w=entrance width,
# /H/ i=num hives inside tunnel, o=num hives outside tunnel, f=num hives free to be inside or outside
# /B/ n=num bridges, w=bridge width,
# /X/ n=num barriers, w=barrier width
evolve-spec=B:9,30;X:20,50
num-trials-per-config=100
num-configs-per-gen=200
num-generations=200
num-islands=1
migration-period=200
migration-num-select=1
migration-num-replace=1
bridge-overlaps-allowed=true
use-diverse-algorithms=false
#
### VISUALISATION SPEC
#
visualise=false
vis-cell-size=1
vis-delay-per-step=0
vis-bee-path-draw-len=100
#
### LOGGING SPEC
#
logging=true
log-dir=output
log-filename-prefix=200-gen-evolve-BX-200-pop-2000-its-20-X-100-epi
command-line-quiet=false
